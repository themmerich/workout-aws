<p-toolbar>
  <ng-template pTemplate="start">
    <p-multiSelect
      [options]="allColumns"
      [ngModel]="visibleColumns()"
      (ngModelChange)="visibleColumns.set($event)"
      optionLabel="header"
      selectedItemsLabel="{0} Spalten"
      placeholder="Spalten"
      [showHeader]="false"
    />
  </ng-template>
  <ng-template pTemplate="center">
    <p-iconField iconPosition="left">
      <p-inputIcon><i class="pi pi-search"></i></p-inputIcon>
      <input
        type="text"
        pInputText
        (input)="dt.filterGlobal($any($event.target).value, 'contains')"
        placeholder="Globale Suche"
      />
    </p-iconField>
  </ng-template>
</p-toolbar>

<p-table
  #dt
  [value]="equipments()"
  [columns]="visibleColumns()"
  dataKey="id"
  [globalFilterFields]="['id', 'name', 'category']"
  [scrollable]="true"
  styleClass="p-datatable-sm"
>
  <ng-template pTemplate="header" let-columns>
    <tr>
      @for (col of columns; track col.field) {
        <th [pSortableColumn]="col.field">
          <div class="column-header">
            {{ col.header }}
            <p-sortIcon [field]="col.field" />
            <p-columnFilter [field]="col.field" type="text" display="menu" />
          </div>
        </th>
      }
    </tr>
  </ng-template>
  <ng-template pTemplate="body" let-row let-columns="columns">
    <tr>
      @for (col of columns; track col.field) {
        <td>{{ row[col.field] }}</td>
      }
    </tr>
  </ng-template>
  <ng-template pTemplate="emptymessage">
    <tr>
      <td [attr.colspan]="visibleColumns().length">Keine Einträge gefunden.</td>
    </tr>
  </ng-template>
</p-table>
